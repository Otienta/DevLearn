name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - develop

jobs:
  validate:
    name: Validate DevLearn
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate-content

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
